<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteMind AI - Premium Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Animated Particle Background -->
    <div class="particles-container">
        <!-- We will generate these with JS to randomize them -->
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="avatar" style="background:transparent; border:none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FCF6BA;" />
                                <stop offset="100%" style="stop-color:#AA771C;" />
                            </linearGradient>
                        </defs>
                        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                        <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
                    </svg>
                </div>
                <span class="logo-text">SiteMind AI</span>
            </div>
            
            <button id="newChatBtn" class="gradient-btn new-chat-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                New Chat
            </button>
            
            <h3>Recent Chats</h3>
            <div class="chat-history" id="chatHistory">
                <!-- Chat history items will be loaded here -->
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">{{ username[0]|upper }}</div>
                    <span>{{ username }}</span>
                </div>
                <a href="/logout" class="logout-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-top:2px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </a>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            
            <!-- Hero Screen (For creating a new chat) -->
            <div id="newChatScreen" class="screen active">
                <h1 class="hero-heading">Learn Anything From <br><span class="gradient-text">Any Website</span></h1>
                <p class="hero-sub">Paste a URL and chat with an AI that deeply understands its content.</p>
                
                <div class="url-input-container">
                    <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="url" id="urlInput" placeholder="Paste any website URL (Wikipedia, Docs, Blogs...)">
                    <button id="processUrlBtn" class="gradient-btn">Start Learning</button>
                </div>
                
                <div id="loadingIndicator" class="loading hidden">
                    <div class="ai-ring-wrapper">
                        <div class="ai-ring"></div>
                        <div class="ai-ring-inner"></div>
                    </div>
                    <p id="loadingMessage" class="loading-text">🔍 Reading website...</p>
                </div>
            </div>

            <!-- Chat Screen -->
            <div id="chatScreen" class="screen hidden">
                <div class="messages" id="messagesContainer">
                    <!-- Messages will be appended here -->
                </div>
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="Ask a question about the website..." rows="1"></textarea>
                        <button id="sendMessageBtn" class="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pass backend URL to JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
